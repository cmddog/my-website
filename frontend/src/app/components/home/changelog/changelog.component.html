<h1>Planned</h1>
<ul>
  @for (entry of planned; track entry) {
    <li>{{ entry }}</li>
  }
</ul>
<hr />
<div class="changes">
  @for (entry of changelog; track entry.date) {
    <app-changelog-entry
      [additions]="entry.additions"
      [changes]="entry.changes"
      [fixes]="entry.fixes"
      [removals]="entry.removals"
      [date]="entry.date"
    />
  }
</div>
