<h1>Planned</h1>
<ul>
  @for (entry of planned; track entry) {
    <li>{{ entry }}</li>
  }
</ul>
<hr />
<div class="changes">
  @for (entry of changelog; track entry.date) {
    <app-changelog-entry
      [additions]="entry.additions ?? undefined"
      [changes]="entry.changes ?? undefined"
      [fixes]="entry.fixes ?? undefined"
      [removals]="entry.removals ?? undefined"
      [date]="entry.date ?? '0001-01-01'"
    />
  }
</div>
