<div class="settings">
  <h3>General</h3>
  <div class="toggle-setting">
    <div>
      Swap <span class="colour-primary">primary</span> and
      <span class="colour-accent">accent</span> colours
    </div>
    <label class="switch">
      <input #swapTheme type="checkbox" (change)="onThemeSwap($event)" />
      <span class="slider"></span>
    </label>
  </div>
  <h3>Chat</h3>
  <div class="toggle-setting">
    <div>Enable chat</div>
    <label class="switch">
      <input
        #enableChat
        type="checkbox"
        (change)="settings.toggleChatEnabled(); settings.chatEnabled() ? chat.connect() : chat.disconnect()"
      />
      <span class="slider"></span>
    </label>
  </div>
  <div class="toggle-setting">
    <div>Close chat after sending a message</div>
    <label class="switch">
      <input
        #closeOnSend
        type="checkbox"
        (change)="settings.toggleCloseChatOnSend()"
      />
      <span class="slider"></span>
    </label>
  </div>
  <div class="toggle-setting">
    <div>Play a click noise when a message is sent in chat</div>
    <label class="switch">
      <input
        #chatNotif
        type="checkbox"
        (change)="settings.togglePlayChatNotif()"
      />
      <span class="slider"></span>
    </label>
  </div>
  <div class="toggle-setting">
    <div>Play a bell noise when you are pinged in chat</div>
    <label class="switch">
      <input
        #pingNotif
        type="checkbox"
        (change)="settings.togglePlayPingNotif()"
      />
      <span class="slider"></span>
    </label>
  </div>
</div>
