<div class="window-constraint">
  <app-draggable-container
    (closeButtonClicked)="close('introduction')"
    [allowResize]="false"
    [class.hide]="!openWindows().has('introduction')"
    [prefWidth]="40 * 16"
    animate.enter="window-enter"
    animate.leave="window-leave"
    cardTitle="Introduction"
  >
    <app-about-me />
  </app-draggable-container>

  <app-draggable-container
    (closeButtonClicked)="close('changelog')"
    [class.hide]="!openWindows().has('changelog')"
    cardTitle="Feature Log"
  >
    <app-changelog />
  </app-draggable-container>
</div>

<div class="taskbar">
  @for (entry of windows; track entry[0]) {
    @if (!openWindows().has(entry[0])) {
      <button (click)="open(entry[0])">{{ entry[1] }}
        @if (entry[0] == 'introduction') {
          <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px"
               fill="currentColor">
            <path
              d="M237-285q54-38 115.5-56.5T480-360q66 0 127.5 18.5T723-285q35-41 52-91t17-104q0-130-91-221t-221-91q-130 0-221 91t-91 221q0 54 17 104t52 91Zm141-165q-42-42-42-102t42-102q42-42 102-42t102 42q42 42 42 102t-42 102q-42 42-102 42t-102-42ZM480-96q-79 0-149-30t-122.5-82.5Q156-261 126-331T96-480q0-80 30-149.5t82.5-122Q261-804 331-834t149-30q80 0 149.5 30t122 82.5Q804-699 834-629.5T864-480q0 79-30 149t-82.5 122.5Q699-156 629.5-126T480-96Zm100-88.5q48-16.5 90-48.5-43-27-91-41t-99-14q-51 0-99.5 13.5T290-233q42 32 90 48.5T480-168q52 0 100-16.5ZM531-501q21-21 21-51t-21-51q-21-21-51-21t-51 21q-21 21-21 51t21 51q21 21 51 21t51-21Zm-51-51Zm0 319Z" />
          </svg>
        } @else if (entry[0] == 'changelog') {
          <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px"
               fill="currentColor">
            <path
              d="M216-312h528v-72H216v72Zm0-132h528v-72H216v72Zm0-132h384v-72H216v72Zm-48 384q-29.7 0-50.85-21.16Q96-234.32 96-264.04v-432.24Q96-726 117.15-747T168-768h624q29.7 0 50.85 21.16Q864-725.68 864-695.96v432.24Q864-234 842.85-213T792-192H168Zm0-72h624v-432H168v432Zm0 0v-432 432Z" />
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px"
               fill="currentColor">
            <path d="M120-120v-320h80v184l504-504H520v-80h320v320h-80v-184L256-200h184v80H120Z" />
          </svg>
        }
      </button>
    }
  }
</div>
