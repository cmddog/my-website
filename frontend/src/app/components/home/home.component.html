<div class="window-constraint">
  <app-draggable-container
    (closeButtonClicked)="displayIntroduction = false"
    [allowResize]="false"
    [class.hidden]="!displayIntroduction"
    [prefWidth]="40 * 16"
    cardTitle="Introduction"
  >
    <app-about-me/>
  </app-draggable-container>

  <app-draggable-container
    (closeButtonClicked)="displayChangelog = false"
    [class.hidden]="!displayChangelog"
    cardTitle="Feature Log"
  >
    <app-change-log/>
  </app-draggable-container>
</div>
