@if (message().kind === "chat") {
  <p class="minecraft-regular">
    <span id="sender" class="minecraft-regular"><{{ message().sender }}><span id="tooltip" class="minecraft-regular">{{ time() }}</span></span>&nbsp;{{ message().content }}
  </p>
} @else {
  <p [class]="message().color" class="minecraft-regular">
    [Server] {{ message().text }}
  </p>
}
