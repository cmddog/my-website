<div
  #cardEl
  [ngStyle]="cardStyles"
  class="draggable-card"
>
  <!-- Drag handle header -->
  <div
    (mousedown)="onHeaderMouseDown($event)"
    class="card-header"
  >
    <span class="card-title">{{ cardTitle() }}</span>
    <button (click)="closeButtonClicked.emit()" class="header-x">
      <svg height="24px" viewBox="0 -960 960 960" width="24px" xmlns="http://www.w3.org/2000/svg">
        <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z" />
      </svg>
    </button>
  </div>

  <!-- Card body – projects whatever the consumer puts inside -->
  <div class="card-body">
    <ng-content />
  </div>

  <!-- Resize handle (bottom-right corner) -->
  <div
    (mousedown)="onResizeMouseDown($event)"
    [class.hidden]="!allowResize()"
    class="resize-handle"
    title="Drag to resize"
  >
    <svg viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">
      <line stroke="currentColor" stroke-width="1.5" x1="3" x2="10" y1="10" y2="3" />
      <line stroke="currentColor" stroke-width="1.5" x1="6" x2="10" y1="10" y2="6" />
    </svg>
  </div>
</div>
